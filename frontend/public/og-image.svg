<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FBBF24" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c63ff" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6c63ff" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Purple glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="280" ry="180" fill="#6c63ff" fill-opacity="0.06" />
  <!-- Blue glow blob bottom-left -->
  <ellipse cx="150" cy="520" rx="200" ry="150" fill="#3B82F6" fill-opacity="0.07" />

  <!-- Logo mark (HR monogram) — scaled to fit left section -->
  <g transform="translate(88, 155) scale(0.47)" filter="url(#shadow)">
    <!-- Path 1: Left stem and H crossbar -->
    <path d="M136 138 V410 M136 274 H266" stroke="url(#mainGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Path 2: Right stem with R loop -->
    <path d="M266 410 V138 A 68 68 0 0 1 266 274 L356 410" stroke="url(#mainGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Spark -->
    <path d="M370 78 Q370 108 400 108 Q370 108 370 138 Q370 108 340 108 Q370 108 370 78 Z" fill="url(#sparkGrad)" filter="url(#glow)" />
  </g>

  <!-- Accent line under logo -->
  <rect x="88" y="423" width="200" height="3" rx="2" fill="url(#accentLine)" />

  <!-- Brand name -->
  <text x="340" y="290" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="96" fill="#f0f0f0" letter-spacing="-2">HireReady</text>

  <!-- Tagline -->
  <text x="342" y="355" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="34" fill="#888888" letter-spacing="0.2">ATS Resume Scorer</text>

  <!-- Divider line -->
  <rect x="340" y="388" width="700" height="2" rx="1" fill="#2e2e2e" />

  <!-- Description -->
  <text x="342" y="438" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="26" fill="#aaaaaa">Know your chances before they do.</text>

  <!-- Feature badges -->
  <g transform="translate(342, 475)">
    <!-- Badge 1 -->
    <rect width="168" height="42" rx="21" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1.5" />
    <text x="84" y="27" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#6c63ff" font-weight="600">⚡ Instant Score</text>
    <!-- Badge 2 -->
    <rect x="182" width="172" height="42" rx="21" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1.5" />
    <text x="268" y="27" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#4caf7d" font-weight="600">✓ No API Keys</text>
    <!-- Badge 3 -->
    <rect x="368" width="182" height="42" rx="21" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1.5" />
    <text x="459" y="27" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#f0a500" font-weight="600">★ 100% Private</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="612" width="1200" height="18" rx="0" fill="#6c63ff" fill-opacity="0.35" />
  <rect x="0" y="618" width="1200" height="12" rx="0" fill="#6c63ff" fill-opacity="0.5" />

  <!-- Domain -->
  <text x="1160" y="600" text-anchor="end" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="20" fill="#444444">hireready.oshoupadhyay.in</text>
</svg>
