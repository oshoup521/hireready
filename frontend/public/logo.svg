<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep, formal, and premium corporate gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81" /> <!-- Deep Midnight Indigo -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Professional Royal Blue -->
    </linearGradient>
    
    <!-- Creative metallic gold/amber spark gradient representing AI intelligence/scoring -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" /> <!-- Rich Gold -->
      <stop offset="100%" stop-color="#FBBF24" /> <!-- Golden Glow -->
    </linearGradient>
    
    <!-- Very subtle drop shadow to add physical depth, working seamlessly on light & dark themes -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Group containing the monogram and the AI spark -->
  <g filter="url(#shadow)">
    <!-- Path 1: Left stem and the H crossbar -->
    <path d="M136 138 V410 M136 274 H266" stroke="url(#mainGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Path 2: Right stem that transforms into the 'R' loop and leg, interlocking with the 'H' -->
    <path d="M266 410 V138 A 68 68 0 0 1 266 274 L356 410" stroke="url(#mainGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Path 3: The AI / Insight Spark (creative 4-pointed star nested perfectly) -->
    <path d="M370 78 Q370 108 400 108 Q370 108 370 138 Q370 108 340 108 Q370 108 370 78 Z" fill="url(#sparkGrad)" />
  </g>
</svg>
