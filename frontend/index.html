<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HireReady — ATS Resume Scorer</title>
    <meta name="description" content="Know your ATS score before you apply. Upload your resume and job description to get instant feedback." />

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.hireready.oshoupadhyay.in/" />
    <meta property="og:title" content="HireReady — ATS Resume Scorer" />
    <meta property="og:description" content="Know your ATS score before you apply. Upload your resume and job description to get instant feedback." />
    <meta property="og:image" content="https://www.hireready.oshoupadhyay.in/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="HireReady" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.hireready.oshoupadhyay.in/" />
    <meta name="twitter:title" content="HireReady — ATS Resume Scorer" />
    <meta name="twitter:description" content="Know your ATS score before you apply. Upload your resume and job description to get instant feedback." />
    <meta name="twitter:image" content="https://www.hireready.oshoupadhyay.in/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- PWA: theme + iOS home-screen icon. The manifest + service worker
         are injected automatically by vite-plugin-pwa at build time. -->
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HireReady" />

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
